version: 2

models:
  - name: stg_transactions
    description: Cleaned transaction records.
    columns:
      - name: transaction_id
        description: Primary identifier for each transaction.
        tests:
          - unique
          - not_null
      - name: product_id
        description: Product identifier.
        tests:
          - not_null
      - name: salesperson_id
        description: Salesperson identifier.
        tests:
          - not_null
      - name: payment_method
        description: Payment method used for the transaction.
        tests:
          - accepted_values:
              values: [cash, credit, transfer]
      - name: delivery_status
        description: Delivery status for the transaction.
        tests:
          - accepted_values:
              values: [delivered, in_transit, pending]
      - name: transaction_status
        description: Transaction status.
        tests:
          - accepted_values:
              values: [completed, pending, returned]

  - name: stg_products
    description: Cleaned product dimension records.
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_distributors
    description: Cleaned distributor dimension records.
    columns:
      - name: distributor_id
        tests:
          - unique
          - not_null

  - name: stg_salespersons
    description: Cleaned salesperson dimension records.
    columns:
      - name: salesperson_id
        tests:
          - unique
          - not_null

  - name: stg_monthly_targets
    description: Cleaned monthly target records.
    columns:
      - name: record_id
        tests:
          - unique
          - not_null

  - name: stg_date_table
    description: Cleaned date dimension records.
    columns:
      - name: date
        tests:
          - unique
          - not_null
